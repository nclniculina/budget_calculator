<!DOCTYPE html>
<html lang="deu"><!-- Hauptsprache der Seite: Deutsch -->

<head>
<meta charset="UTF-8">
<title>Budgetrechner</title>
<link rel="stylesheet" href="style.css"><!-- CSS-Datei für Layout und Design -->
</head>

<body>
<h1>Budgetrechner</h1>  <!-- Hauptüberschrift der Seite -->

<div class="budget-inputs">

<!-- Abschnitt: Eingaben für Einkommen -->
<input type="number" id="incomeAmount" placeholder="Höhe des Einkommens">
<input type="text" id="incomeCategory" placeholder="Einkommenskategorie">
<button id="addIncomeBtn">Einnahme hinzufügen</button>

  <!-- Abschnitt: Eingaben für Ausgaben -->
<input type="number" id="expenseAmount" placeholder="Gesamtausgaben">
<input type="text" id="expenseCategory" placeholder="Ausgabenkategorie">
<button id="addExpenseBtn">Ausgabe hinzufügen</button>

</div>

<!-- Abschnitt: Zusammenfassung des Budgets -->
<div class="budget-summary">
<p>Gesamteinnahmen: <span id="totalIncome">0</span></p>
<p>Gesamtausgaben: <span id="totalExpense">0</span></p>
<p>Баланс: <span id="balance">0</span></p>
</div>

<!-- Abschnitt: Transaktionsverlauf -->
<div class="history">
<h2>Transaktionsverlauf</h2>
<ul id="historyList"></ul>  <!-- Hier werden alle Einnahmen und Ausgaben angezeigt -->
</div>

<script src="script.js"></script>   <!-- JavaScript-Datei für Logik und Berechnungen -->
</body>
</html>
